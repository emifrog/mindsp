# Render Blueprint pour MindSP
# https://render.com/docs/blueprint-spec

services:
  # Service Web (Next.js + Socket.IO)
  - type: web
    name: mindsp-web
    runtime: node
    plan: starter # Gratuit pendant 90 jours, puis $7/mois
    region: frankfurt # Plus proche de la France
    buildCommand: npm ci && npx prisma generate --no-engine && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mindsp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mindsp-redis
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false # À définir manuellement avec votre URL Render
      - key: NEXTAUTH_SECRET
        generateValue: true # Génère automatiquement un secret
      - key: UPSTASH_REDIS_REST_URL
        sync: false # À définir manuellement (Upstash)
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false # À définir manuellement (Upstash)
      - key: ALLOWED_ORIGINS
        sync: false # À définir avec votre URL Render
      - key: NEXT_PUBLIC_APP_URL
        sync: false # À définir avec votre URL Render
      - key: NEXT_PUBLIC_APP_NAME
        value: MindSP
      - key: NEXT_PUBLIC_ENABLE_PWA
        value: true
      - key: NEXT_PUBLIC_ENABLE_OFFLINE
        value: true
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false # À générer avec npx web-push generate-vapid-keys
      - key: VAPID_PRIVATE_KEY
        sync: false # À générer avec npx web-push generate-vapid-keys
      - key: VAPID_SUBJECT
        value: mailto:admin@mindsp.fr
      - key: PRISMA_HIDE_UPDATE_MESSAGE
        value: true
      - key: REDIS_HOST
        fromService:
          type: redis
          name: mindsp-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: mindsp-redis
          property: port
    healthCheckPath: /api/health
    autoDeploy: true # Deploy automatique sur push git

databases:
  # PostgreSQL Database
  - name: mindsp-db
    databaseName: mindsp
    plan: starter # Gratuit
    region: frankfurt
    postgresMajorVersion: 16
    ipAllowList: [] # Autoriser toutes les IPs (ou spécifier les vôtres)

# Redis (pour BullMQ et cache)
# Note: Redis natif Render est payant ($10/mois)
# Alternative gratuite: Utiliser Upstash Redis (déjà configuré dans votre .env)
# Si vous voulez Redis natif Render, décommentez ci-dessous:
#
# services:
#   - type: redis
#     name: mindsp-redis
#     plan: starter
#     region: frankfurt
#     maxmemoryPolicy: allkeys-lru
#     ipAllowList: []
